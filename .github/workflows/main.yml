name: Build and Push

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Validate BigQuery tables
        run: |
          PROJECT=future-gadget-labs-483502
          TABLES=(
            "inventory.products"
            "inventory.transactions"
            "inventory.collection"
            "market_data.price_history"
          )
          FAILED=0
          for TABLE in "${TABLES[@]}"; do
            if bq show --project_id=$PROJECT "$TABLE" > /dev/null 2>&1; then
              echo "✓ $TABLE"
            else
              echo "✗ $TABLE NOT FOUND"
              FAILED=1
            fi
          done
          [ $FAILED -eq 0 ] || exit 1

      - uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            us-central1-docker.pkg.dev/future-gadget-labs-483502/tcg-collection/collection-showcase:${{ github.sha }}
            us-central1-docker.pkg.dev/future-gadget-labs-483502/tcg-collection/collection-showcase:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update collection-showcase \
            --region=us-central1 \
            --project=future-gadget-labs-483502 \
            --image=us-central1-docker.pkg.dev/future-gadget-labs-483502/tcg-collection/collection-showcase:${{ github.sha }} \
            --update-env-vars="GITHUB_TOKEN=${{ secrets.DATA_SYNC_PAT }}"

      - name: Set up daily price fetch scheduler
        run: |
          PROJECT=future-gadget-labs-483502
          REGION=us-central1
          SERVICE_URL=$(gcloud run services describe collection-showcase \
            --region=$REGION \
            --project=$PROJECT \
            --format='value(status.url)')

          gcloud scheduler jobs create http fetch-prices-daily \
            --project=$PROJECT \
            --location=$REGION \
            --schedule="0 8 * * *" \
            --time-zone="America/New_York" \
            --uri="${SERVICE_URL}/price-history/fetch/scheduled" \
            --message-body="" \
            --headers="X-Sync-Token=${{ secrets.SYNC_SECRET }},Content-Type=application/json" \
            --http-method=POST \
            --attempt-deadline=30m \
            2>/dev/null || \
          gcloud scheduler jobs update http fetch-prices-daily \
            --project=$PROJECT \
            --location=$REGION \
            --schedule="0 8 * * *" \
            --time-zone="America/New_York" \
            --uri="${SERVICE_URL}/price-history/fetch/scheduled" \
            --message-body="" \
            --headers="X-Sync-Token=${{ secrets.SYNC_SECRET }},Content-Type=application/json" \
            --http-method=POST \
            --attempt-deadline=30m
